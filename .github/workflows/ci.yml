name: CI

on:
    pull_request:
    push:
        branches:
            - main
            - master
    workflow_dispatch:

permissions:
    contents: write

jobs:
    validate:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
            PLAYWRIGHT_BROWSERS_PATH: /opt/playwright
            HUSKY: "0"
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Audit dependencies
              if: ${{ !env.ACT }}
              run: npm audit --omit=dev --audit-level=high

            - name: Install Playwright Chromium
              run: npx playwright install --with-deps chromium

            - name: Validate sandbox
              run: |
                  npm run lint
                  npm run build
                  npm test

            - name: Generate coverage reports
              if: always()
              run: npm run report

            - name: Generate docs screenshots
              if: ${{ !env.ACT && ((github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || (github.event_name == 'pull_request' && github.head_ref == 'develop')) }}
              run: |
                  npm run docs:screenshots
                  mkdir -p coverage/screenshots
                  cp -r docs/screenshots/. coverage/screenshots/

            - name: Publish coverage artifacts branch
              if: ${{ !env.ACT && ((github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || (github.event_name == 'pull_request' && github.head_ref == 'develop')) && hashFiles('coverage/coverage-summary.json') != '' }}
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  folder: ./coverage
                  branch: coverage
                  single-commit: true
