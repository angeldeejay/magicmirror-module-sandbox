name: Publish packages

on:
    release:
        types:
            - published
    workflow_dispatch:
        inputs:
            npm-tag:
                description: npm dist-tag to publish on both registries
                required: false
                default: latest

permissions:
    contents: read
    id-token: write
    packages: write

jobs:
    publish:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js for npmjs
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: package-lock.json
                  registry-url: https://registry.npmjs.org

            - name: Validate release tag matches package version
              if: github.event_name == 'release'
              run: |
                  node -e 'const pkg=require("./package.json"); const expected="v" + pkg.version; const actual=process.env.GITHUB_REF_NAME; if (actual !== expected) { throw new Error(`Release tag ${actual} does not match package.json version ${expected}.`); }'

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright Chromium
              run: npx playwright install --with-deps chromium

            - name: Validate sandbox
              run: |
                  npm run lint
                  npm run build
                  npm test

            - name: Pack distributable
              run: npm pack --dry-run

            - name: Publish prerelease to npm
              if: github.event_name == 'release' && github.event.release.prerelease
              run: npm publish --provenance --tag next

            - name: Publish release to npm
              if: github.event_name == 'release' && !github.event.release.prerelease
              run: npm publish --provenance

            - name: Publish manual release to npm
              if: github.event_name == 'workflow_dispatch'
              run: npm publish --provenance --tag "${{ inputs.npm-tag }}"

            - name: Setup Node.js for GitHub Packages
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: https://npm.pkg.github.com
                  scope: "@angeldeejay"

            - name: Publish prerelease to GitHub Packages
              if: github.event_name == 'release' && github.event.release.prerelease
              run: npm publish --registry=https://npm.pkg.github.com --tag next
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish release to GitHub Packages
              if: github.event_name == 'release' && !github.event.release.prerelease
              run: npm publish --registry=https://npm.pkg.github.com
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish manual release to GitHub Packages
              if: github.event_name == 'workflow_dispatch'
              run: npm publish --registry=https://npm.pkg.github.com --tag "${{ inputs.npm-tag }}"
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
